# ===================== Server Configuration =====================
server.port=8080

# ===================== Logging Configuration =====================
# Root log level (default for all packages not explicitly configured)
logging.level.root=INFO

# Package-specific log level - set to DEBUG to see detailed logs from our own code
logging.level.com.cognizant.springlearn=DEBUG

# Reduce noise from Spring framework's own internal logs
logging.level.org.springframework=INFO

# Custom log pattern for console output
# %d = date, %thread = thread name, %-5level = log level, %logger{36} = logger name, %msg = the message
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Optional: write logs to a file as well
logging.file.name=logs/spring-learn.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Application name (shown in some Boot logs)
spring.application.name=spring-learn
